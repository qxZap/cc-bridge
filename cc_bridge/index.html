<!doctype html>
<html lang=en>
<head>
<meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name=color-scheme content="dark light">
<title>cc-bridge</title>
<style>
:root{
  --bg:#0b0e14; --surface:#12161f; --surface2:#161b26; --line:#232a36;
  --text:#e7ecf4; --muted:#8a94a6; --faint:#5c6675;
  --accent:#4f8cff; --accent-ink:#fff; --user:#2b64d6;
  --tool:#1a2a16; --tool-line:#2c4726; --tool-ink:#9fdd8a;
  --think:#171b24; --code:#0c1017; --danger:#c0463f;
  --radius:16px; --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.18);
}
@media (prefers-color-scheme:light){:root{
  --bg:#f4f6fb; --surface:#fff; --surface2:#f0f3f9; --line:#e2e7f0;
  --text:#141a24; --muted:#5a6472; --faint:#8b95a6;
  --accent:#2f6ffb; --user:#2f6ffb; --tool:#eef7ea; --tool-line:#cfe6c5; --tool-ink:#2f6b1f;
  --think:#eef1f7; --code:#f2f5fb; --shadow:0 1px 2px rgba(20,30,50,.06),0 8px 24px rgba(20,30,50,.08);
}}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--text);
  font:15px/1.55 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  -webkit-font-smoothing:antialiased;overscroll-behavior:none}
[hidden]{display:none!important}
button{font:inherit;border:0;background:none;color:inherit;cursor:pointer}
.screen{position:fixed;inset:0;max-width:860px;margin:0 auto;display:flex;flex-direction:column;background:var(--bg)}

/* ---- top bars ---- */
.bar{display:flex;align-items:center;gap:10px;padding:12px 14px;
  padding-top:max(12px,env(safe-area-inset-top));
  border-bottom:1px solid var(--line);background:color-mix(in srgb,var(--bg) 82%,transparent);
  backdrop-filter:saturate(1.4) blur(12px);position:sticky;top:0;z-index:5}
.brand{font-size:18px;font-weight:750;letter-spacing:-.2px;display:flex;align-items:center;gap:9px}
.dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 22%,transparent)}
.spacer{flex:1}
.iconbtn{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;color:var(--muted)}
.iconbtn:hover{background:var(--surface2);color:var(--text)}
.iconbtn.on{color:var(--accent)}
.iconbtn svg{width:20px;height:20px}

/* ---- search ---- */
.search{padding:10px 14px}
.search .wrap{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);
  border-radius:13px;padding:0 12px;box-shadow:var(--shadow)}
.search svg{width:17px;height:17px;color:var(--faint);flex:none}
.search input{flex:1;background:none;border:0;outline:0;color:var(--text);font:inherit;font-size:16px;padding:11px 0}

/* ---- chat list ---- */
#list{flex:1;overflow:auto;padding:4px 8px 20px}
.row{display:flex;align-items:center;gap:12px;padding:11px 10px;border-radius:14px;cursor:pointer}
.row:hover{background:var(--surface)}
.row:active{transform:scale(.994)}
.mono{width:44px;height:44px;border-radius:13px;flex:none;display:grid;place-items:center;
  color:#fff;font-weight:700;font-size:16px;letter-spacing:.3px}
.mono.imglogo{overflow:hidden}
.mono.imglogo img{width:100%;height:100%;object-fit:cover;border-radius:inherit;display:block}
.row .meta{flex:1;min-width:0}
.row .t{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .c{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.row .side{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex:none}
.star{flex:none;width:34px;height:34px;display:grid;place-items:center;color:var(--faint);border-radius:9px}
.star:hover{background:var(--surface2);color:var(--muted)}
.star.on{color:#ffcf6b}.star.on svg path{fill:#ffcf6b}
.star svg{width:19px;height:19px}
.row .time{font-size:11px;color:var(--faint)}
.live{width:8px;height:8px;border-radius:50%;background:#37d67a;box-shadow:0 0 0 0 rgba(55,214,122,.6);animation:pulse 1.6s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(55,214,122,.5)}70%{box-shadow:0 0 0 7px rgba(55,214,122,0)}100%{box-shadow:0 0 0 0 rgba(55,214,122,0)}}
.empty{text-align:center;color:var(--faint);padding:60px 20px}

/* ---- conversation ---- */
.title{min-width:0}
.title .n{font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.title .s{font-size:12px;color:var(--muted)}
.title .s.on{color:#37d67a}
#ctxwrap{display:flex;align-items:center;gap:6px;flex:none}
#ctxwrap .pct{font:600 11px/1 ui-monospace,monospace;color:var(--muted);font-variant-numeric:tabular-nums}
#msgs{flex:1;overflow:auto;padding:16px 14px 8px;display:flex;flex-direction:column;gap:10px}
.more{align-self:center;color:var(--faint);font-size:12px;padding:6px 12px;border-radius:20px;background:var(--surface)}
.msg{max-width:82%;padding:9px 13px;border-radius:var(--radius);white-space:normal;
  word-wrap:break-word;overflow-wrap:anywhere;box-shadow:var(--shadow);animation:rise .18s ease}
@keyframes rise{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.msg.user{align-self:flex-end;background:linear-gradient(180deg,var(--accent),var(--user));color:#fff;border-bottom-right-radius:6px}
.msg.assistant{align-self:flex-start;background:var(--surface);border:1px solid var(--line);border-bottom-left-radius:6px}
.msg.think{align-self:flex-start;background:var(--think);color:var(--muted);font-size:13.5px;border:1px dashed var(--line);max-width:88%}
.msg.think .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);display:block;margin-bottom:3px}
details.msg.tool{align-self:flex-start;background:var(--tool);border:1px solid var(--tool-line);color:var(--tool-ink);
  padding:0;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;max-width:88%}
details.tool summary{display:flex;align-items:center;gap:8px;padding:9px 12px;list-style:none;user-select:none}
details.tool summary::-webkit-details-marker{display:none}
.chev{width:14px;height:14px;transition:transform .15s}
details.tool[open] .chev{transform:rotate(90deg)}
details.tool .tname{font-weight:600}
details.tool pre{margin:0;padding:10px 12px;border-top:1px solid var(--tool-line);
  background:color-mix(in srgb,var(--tool) 60%,#000 8%);overflow:auto;border-radius:0 0 var(--radius) var(--radius)}
/* AskUserQuestion — render as an answerable card */
.msg.ask{align-self:flex-start;background:var(--surface);border:1px solid var(--accent);max-width:90%;border-bottom-left-radius:6px;padding:11px 13px}
.msg.ask .asklbl{font:600 11px/1 ui-monospace,monospace;letter-spacing:.4px;color:var(--accent);margin-bottom:8px}
.msg.ask .qh{font:600 11px/1 ui-monospace,monospace;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);margin:8px 0 3px}
.msg.ask .qq{font-weight:600;margin-bottom:8px}
.qopts{display:flex;flex-direction:column;gap:7px;margin-bottom:4px}
.qopt{text-align:left;border:1px solid var(--line);background:var(--surface2);border-radius:11px;padding:9px 12px;color:var(--text);display:flex;flex-direction:column;gap:2px;cursor:pointer;transition:.12s;font:inherit}
.qopt:hover{border-color:var(--accent);transform:translateX(2px)}
.qopt b{font-size:14px;font-weight:650}
.qopt span{font-size:12px;color:var(--muted);line-height:1.4}
/* markdown */
.md>*:first-child{margin-top:0}.md>*:last-child{margin-bottom:0}
.md p{margin:.5em 0}.md h1,.md h2,.md h3{margin:.7em 0 .35em;line-height:1.25}
.md h1{font-size:1.3em}.md h2{font-size:1.16em}.md h3{font-size:1.05em}
.md ul,.md ol{margin:.4em 0;padding-left:1.4em}.md li{margin:.15em 0}
.md a{color:var(--accent);text-decoration:none}.md a:hover{text-decoration:underline}
.md blockquote{margin:.5em 0;padding:.1em .9em;border-left:3px solid var(--line);color:var(--muted)}
.md hr{border:0;border-top:1px solid var(--line);margin:.8em 0}
.md code{background:var(--code);padding:1.5px 5px;border-radius:6px;font-family:ui-monospace,Menlo,monospace;font-size:.88em}
.md pre{background:var(--code);border:1px solid var(--line);border-radius:11px;padding:12px 13px;overflow:auto;margin:.5em 0}
.md pre code{background:none;padding:0;font-size:12.5px;line-height:1.5}
.md table{border-collapse:collapse;margin:.5em 0;font-size:.9em;display:block;max-width:100%;overflow-x:auto}
.md th,.md td{border:1px solid var(--line);padding:6px 9px;text-align:left;vertical-align:top}
.md th{background:var(--surface2);font-weight:600;white-space:nowrap}
.md tbody tr:nth-child(even){background:color-mix(in srgb,var(--surface2) 45%,transparent)}

/* ---- composer ---- */
.composer{display:flex;align-items:flex-end;gap:8px;padding:10px 12px;
  padding-bottom:max(10px,env(safe-area-inset-bottom));border-top:1px solid var(--line);background:var(--bg)}
#in{flex:1;background:var(--surface);color:var(--text);border:1px solid var(--line);border-radius:15px;
  padding:11px 14px;resize:none;font:inherit;font-size:16px;outline:0;max-height:140px;box-shadow:var(--shadow);
  scrollbar-width:none;-ms-overflow-style:none}
#in::-webkit-scrollbar{width:0;height:0;display:none}
#in:focus{border-color:color-mix(in srgb,var(--accent) 55%,var(--line))}
.circle{width:44px;height:44px;border-radius:50%;flex:none;display:grid;place-items:center;color:#fff}
#send{background:var(--accent)}#send:disabled{opacity:.45}
#stop{background:var(--danger)}
.circle svg{width:20px;height:20px}

/* ---- loading + thinking dots + entrance motion ---- */
.loading{flex:1;display:grid;place-items:center;padding:50px}
.spin{width:26px;height:26px;border-radius:50%;border:3px solid var(--line);border-top-color:var(--accent);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.typing{align-self:flex-start;display:flex;gap:5px;align-items:center;padding:13px 15px;background:var(--surface);
  border:1px solid var(--line);border-radius:var(--radius);border-bottom-left-radius:6px;box-shadow:var(--shadow);animation:fadein .25s ease}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:blink 1.3s infinite ease-in-out}
.typing span:nth-child(2){animation-delay:.18s}.typing span:nth-child(3){animation-delay:.36s}
@keyframes blink{0%,70%,100%{opacity:.3;transform:translateY(0)}35%{opacity:1;transform:translateY(-3px)}}
.msg.think,.msg.assistant{animation:fadein .3s ease}
@keyframes fadein{from{opacity:0;transform:translateY(6px) scale(.99)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.msg,.spin,.typing span,.typing{animation:none!important}}

/* empty conversation pane (mainly for desktop two-pane) */
#convempty{position:absolute;inset:0;display:grid;place-items:center;padding:24px;text-align:center;color:var(--faint);background:var(--bg);z-index:3;line-height:1.5}
.row.on{background:var(--surface2)}

/* ---- desktop: two-pane (list + conversation side by side) ---- */
@media (min-width:880px){
  body{display:flex}
  .screen{position:static;inset:auto;height:100dvh;max-width:none;margin:0}
  #chats{width:clamp(300px,30vw,400px);flex:none;border-right:1px solid var(--line)}
  #conv{flex:1;min-width:0;position:relative}
  #chats[hidden],#conv[hidden]{display:flex!important}   /* ignore the mobile show/hide toggle */
  #back{display:none}
  .msg{max-width:700px}
  #msgs{padding-left:max(16px,4%);padding-right:max(16px,4%)}
}
</style>
</head>
<body>

<!-- CHAT LIST -->
<section id=chats class=screen>
  <div class=bar><span class=brand><span class=dot></span>cc-bridge</span><span class=spacer></span>
    <button class=iconbtn id=bell title="notify me when a turn finishes"><svg viewBox="0 0 24 24" fill=none stroke=currentColor stroke-width=2 stroke-linecap=round stroke-linejoin=round><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0"/></svg></button>
    <button class=iconbtn id=refresh title=refresh><svg viewBox="0 0 24 24" fill=none stroke=currentColor stroke-width=2 stroke-linecap=round stroke-linejoin=round><path d="M21 12a9 9 0 1 1-2.64-6.36M21 3v6h-6"/></svg></button>
  </div>
  <div class=search><div class=wrap>
    <svg viewBox="0 0 24 24" fill=none stroke=currentColor stroke-width=2 stroke-linecap=round><circle cx=11 cy=11 r=7/><path d="m21 21-4.3-4.3"/></svg>
    <input id=q placeholder="Search chats…" autocomplete=off spellcheck=false>
  </div></div>
  <div id=list><div class=empty>Loading chats…</div></div>
</section>

<!-- CONVERSATION -->
<section id=conv class=screen hidden>
  <div class=bar>
    <button class=iconbtn id=back title=back><svg viewBox="0 0 24 24" fill=none stroke=currentColor stroke-width=2.2 stroke-linecap=round stroke-linejoin=round><path d="m15 18-6-6 6-6"/></svg></button>
    <div class="mono" id=cmono style="width:34px;height:34px;border-radius:10px;font-size:14px"></div>
    <div class=title><div class=n id=ctitle></div><div class=s id=cstatus>idle</div></div>
    <span class=spacer></span>
    <button class=iconbtn id=arm title="auto-continue when the usage limit resets"><svg viewBox="0 0 24 24" fill=none stroke=currentColor stroke-width=2 stroke-linecap=round stroke-linejoin=round><path d="M6 2h12M6 22h12M8 2v3.5a4 4 0 0 0 8 0V2M8 22v-3.5a4 4 0 0 1 8 0V22"/></svg></button>
    <div id=ctxwrap title="context used"></div>
  </div>
  <div id=msgs></div>
  <div class=composer>
    <textarea id=in rows=1 placeholder="Reply into this conversation…"></textarea>
    <button class=circle id=send title="send"><svg viewBox="0 0 24 24" fill=none stroke=currentColor stroke-width=2 stroke-linecap=round stroke-linejoin=round><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7Z"/></svg></button>
    <button class="circle" id=stop title="stop" hidden><svg viewBox="0 0 24 24" fill=currentColor><rect x=6 y=6 width=12 height=12 rx=2/></svg></button>
  </div>
  <div id=convempty><div><div style="font-size:34px;margin-bottom:8px">💬</div>Pick a chat from the list</div></div>
</section>

<script>
const $=id=>document.getElementById(id);
let cur=null, curTitle='', sessions=[];
const sendingSet=new Set();               // sids with a turn in flight — per-chat, so chats run independently
const isSending=id=>sendingSet.has(id);
/* per-conversation draft + last-known snapshot, cached in localStorage */
const dkey=id=>'ccb.draft.'+id, mkey=id=>'ccb.msg.'+id;
function saveDraft(id,v){try{v?localStorage.setItem(dkey(id),v):localStorage.removeItem(dkey(id));}catch(e){}}
function loadDraft(id){try{return localStorage.getItem(dkey(id))||'';}catch(e){return'';}}
function cacheMsgs(id,resp){try{localStorage.setItem(mkey(id),JSON.stringify({total:resp.total,start:resp.start,messages:(resp.messages||[]).slice(-60)}));}catch(e){}}
function cachedMsgs(id){try{return JSON.parse(localStorage.getItem(mkey(id))||'null');}catch(e){return null;}}
/* favorites — starred chats, pinned to the top of the list, persisted */
let favs=new Set();try{favs=new Set(JSON.parse(localStorage.getItem('ccb.favs')||'[]'));}catch(e){}
function toggleFav(id){favs.has(id)?favs.delete(id):favs.add(id);try{localStorage.setItem('ccb.favs',JSON.stringify([...favs]));}catch(e){}renderList();}

/* ---------- markdown (escape-first, no deps) ---------- */
const Z="␀";
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function inl(s){return s
  .replace(/`([^`]+)`/g,(m,c)=>'<code>'+c+'</code>')
  .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
  .replace(/(^|[^*])\*([^*\s][^*]*)\*/g,'$1<em>$2</em>')
  .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,'<a href="$2" target=_blank rel=noopener>$1</a>');}
function md(src){
  src=(src||'').replace(/\r\n/g,'\n');
  const B=[]; src=src.replace(/```[^\n]*\n([\s\S]*?)```/g,(m,c)=>{B.push(esc(c));return Z+(B.length-1)+Z;});
  const L=src.split('\n'), o=[]; let i=0;
  const isSep=l=>l.includes('-')&&/^\s*\|?\s*:?-{1,}:?\s*(\|\s*:?-{1,}:?\s*)*\|?\s*$/.test(l);
  const tbl=j=>j+1<L.length&&L[j].includes('|')&&isSep(L[j+1]);
  const cells=l=>{let s=l.trim();if(s[0]==='|')s=s.slice(1);if(s.slice(-1)==='|')s=s.slice(0,-1);return s.split('|').map(c=>c.trim());};
  const blk=x=>new RegExp('^'+Z+'\\d+'+Z+'$').test(x)||/^#{1,6}\s/.test(x)||/^\s*([-*+])\s+/.test(x)||/^\s*\d+\.\s+/.test(x)||/^\s*>\s?/.test(x);
  while(i<L.length){let ln=L[i];
    if(tbl(i)){
      const head=cells(ln);i+=2;const body=[];
      while(i<L.length&&L[i].includes('|')&&L[i].trim()!==''){body.push(cells(L[i]));i++;}
      let t='<table><thead><tr>'+head.map(h=>'<th>'+inl(esc(h))+'</th>').join('')+'</tr></thead><tbody>';
      for(const r of body)t+='<tr>'+r.map(c=>'<td>'+inl(esc(c))+'</td>').join('')+'</tr>';
      o.push(t+'</tbody></table>');continue;
    }
    let ph=ln.match(new RegExp('^'+Z+'(\\d+)'+Z+'$')); if(ph){o.push('<pre><code>'+B[+ph[1]]+'</code></pre>');i++;continue;}
    let h=ln.match(/^(#{1,6})\s+(.*)$/); if(h){o.push('<h'+h[1].length+'>'+inl(esc(h[2]))+'</h'+h[1].length+'>');i++;continue;}
    if(/^\s*([-*+])\s+/.test(ln)){let it=[];while(i<L.length&&/^\s*([-*+])\s+/.test(L[i])){it.push('<li>'+inl(esc(L[i].replace(/^\s*([-*+])\s+/,'')))+'</li>');i++;}o.push('<ul>'+it.join('')+'</ul>');continue;}
    if(/^\s*\d+\.\s+/.test(ln)){let it=[];while(i<L.length&&/^\s*\d+\.\s+/.test(L[i])){it.push('<li>'+inl(esc(L[i].replace(/^\s*\d+\.\s+/,'')))+'</li>');i++;}o.push('<ol>'+it.join('')+'</ol>');continue;}
    if(/^\s*>\s?/.test(ln)){o.push('<blockquote>'+inl(esc(ln.replace(/^\s*>\s?/,'')))+'</blockquote>');i++;continue;}
    if(/^\s*(---|\*\*\*|___)\s*$/.test(ln)){o.push('<hr>');i++;continue;}
    if(ln.trim()===''){i++;continue;}
    let p=[];while(i<L.length&&L[i].trim()!==''&&!blk(L[i])&&!tbl(i)){p.push(L[i]);i++;}
    o.push('<p>'+inl(esc(p.join('\n'))).replace(/\n/g,'<br>')+'</p>');
  }
  return o.join('\n').replace(new RegExp(Z+'(\\d+)'+Z,'g'),(m,n)=>'<pre><code>'+B[n]+'</code></pre>');
}

/* ---------- helpers ---------- */
const HUES=[210,265,330,20,150,190,45,300];
function hue(s){let h=0;for(const c of s)h=(h*31+c.charCodeAt(0))>>>0;return HUES[h%HUES.length];}
function mono(el,title){const h=hue(title||'?');el.textContent=(title||'?').trim()[0].toUpperCase();
  el.style.background='linear-gradient(150deg,hsl('+h+' 70% 55%),hsl('+((h+40)%360)+' 68% 46%))';}
// project logo (from AGENTS.md): image, else emoji/text, else monogram letter
function avatar(el,s){
  const lg=s&&s.logo;
  if(lg&&lg.img){el.textContent='';el.style.fontSize='';el.style.background='var(--surface2)';el.classList.add('imglogo');
    const im=document.createElement('img');im.src=lg.img;im.alt='';el.appendChild(im);return;}
  el.classList.remove('imglogo');
  if(lg&&lg.txt){el.textContent=lg.txt;el.style.background='var(--surface2)';el.style.fontSize='20px';return;}
  el.style.fontSize='';mono(el,s?s.title:'?');
}
function ago(t){const s=Date.now()/1000-t;if(s<60)return'now';if(s<3600)return(s/60|0)+'m';if(s<86400)return(s/3600|0)+'h';return(s/86400|0)+'d';}

/* ---------- chat list ---------- */
function renderList(){
  const q=$('q').value.toLowerCase(), L=$('list'); L.innerHTML='';
  const rows=sessions.filter(s=>!q||((s.title+' '+s.cwd).toLowerCase().includes(q)));
  rows.sort((a,b)=>(favs.has(b.id)?1:0)-(favs.has(a.id)?1:0));   // starred first, mtime order within groups
  if(!rows.length){L.innerHTML='<div class=empty>No chats.</div>';return;}
  for(const s of rows){
    const r=document.createElement('div');r.className='row'+(s.id===cur?' on':'');r.dataset.id=s.id;
    const m=document.createElement('div');m.className='mono';avatar(m,s);
    const meta=document.createElement('div');meta.className='meta';
    meta.innerHTML='<div class=t></div><div class=c></div>';
    meta.querySelector('.t').textContent=s.title; meta.querySelector('.c').textContent=s.cwd;
    const side=document.createElement('div');side.className='side';
    side.innerHTML='<span class=time>'+ago(s.mtime)+'</span>'+(s.running?'<span class=live></span>':'');
    const star=document.createElement('button');star.className='star'+(favs.has(s.id)?' on':'');star.title='favorite';
    star.innerHTML='<svg viewBox="0 0 24 24" fill=none stroke=currentColor stroke-width=1.7 stroke-linejoin=round><path d="M12 3.2l2.6 5.3 5.8.8-4.2 4.1 1 5.8L12 16.9 6.8 19.2l1-5.8L3.6 9.3l5.8-.8z"/></svg>';
    star.onclick=e=>{e.stopPropagation();toggleFav(s.id);};
    r.append(m,meta,side,star); r.onclick=()=>openChat(s); L.appendChild(r);
  }
}
async function loadList(){
  try{sessions=await(await fetch('/api/sessions')).json();}catch(e){return;}
  try{localStorage.setItem('ccb.sessions',JSON.stringify(sessions));}catch(e){}
  if(!$('chats').hidden)renderList();
  if(cur){const s=sessions.find(x=>x.id===cur);setStatus((s&&s.running)||isSending(cur));if(s){setRing(s.ctxpct);$('arm').classList.toggle('on',!!s.armed);}}
}

/* ---------- conversation (incremental render) ---------- */
const WIN=30; let shown=WIN, total=0, curStart=0, nodes=[], lastSig=null, loadingMore=false;
const openTools=new Set();
// Foreground-only alert: title badge + one vibrate when a chat updates while the
// tab is hidden. Background/locked push needs HTTPS (service worker) — see PLAN.md.
let origTitle=document.title, buzzed=false;
function notify(){if(!document.hidden)return;document.title='🔔 cc-bridge';if(!buzzed){buzzed=true;try{navigator.vibrate&&navigator.vibrate([90,40,90]);}catch(e){}}}
document.addEventListener('visibilitychange',()=>{if(!document.hidden){document.title=origTitle;buzzed=false;}});
// Desktop notification when a turn finishes. Real Notifications need a secure
// context (HTTPS or localhost) — works on the PC via http://localhost:PORT, not
// over a plain-http LAN IP (phone falls back to the title/vibrate above).
let notifPerm=('Notification' in window)?Notification.permission:'unsupported', wasWorking=false;
function markDone(title){
  if(!document.hidden)return;                          // you're watching it — no need to ping
  if(notifPerm==='granted'){try{const n=new Notification('Claude is done',{body:(title||'A chat')+' finished thinking',tag:'ccb'});setTimeout(()=>n.close(),8000);}catch(e){}}
  notify();
}
async function enableNotif(){
  if(notifPerm==='unsupported'){alert("This browser blocks notifications on a plain-http LAN address. Open cc-bridge on the PC via http://localhost:"+location.port+" for desktop alerts (or serve it over HTTPS).");return;}
  try{notifPerm=await Notification.requestPermission();}catch(e){}
  $('bell').classList.toggle('on',notifPerm==='granted');
  if(notifPerm==='granted'){try{new Notification('cc-bridge',{body:"On — I'll ping you when a turn finishes."});}catch(e){}}
}
function sig(m){return m.role+'|'+m.kind+'|'+(m.text||'').length+'|'+(m.detail||'').length;}
function askCard(m){
  let data;try{data=JSON.parse(m.detail);}catch(e){}
  const d=document.createElement('div');
  if(!data||!Array.isArray(data.questions)){d.className='msg tool '+m.role;d.textContent='🔧 AskUserQuestion';return d;}
  d.className='msg ask '+m.role;
  const lbl=document.createElement('div');lbl.className='asklbl';lbl.textContent='❓ the agent is asking';d.appendChild(lbl);
  data.questions.forEach(q=>{
    if(q.header){const h=document.createElement('div');h.className='qh';h.textContent=q.header;d.appendChild(h);}
    const qq=document.createElement('div');qq.className='qq md';qq.innerHTML=md(q.question||'');d.appendChild(qq);
    const opts=document.createElement('div');opts.className='qopts';
    (q.options||[]).forEach(o=>{
      const b=document.createElement('button');b.className='qopt';
      const nm=document.createElement('b');nm.textContent=o.label;b.appendChild(nm);
      if(o.description){const s=document.createElement('span');s.textContent=o.description;b.appendChild(s);}
      b.onclick=()=>answerAsk(o.label);
      opts.appendChild(b);
    });
    d.appendChild(opts);
  });
  return d;
}
function answerAsk(label){const t=$('in');t.value=label;t.dispatchEvent(new Event('input'));send();}
function nodeFor(m,gi){
  if(m.kind==='tool'){
    if(m.text==='AskUserQuestion')return askCard(m);
    const d=document.createElement('details');d.className='msg tool '+m.role;
    if(openTools.has(gi))d.open=true;
    d.innerHTML='<summary><svg class=chev viewBox="0 0 24 24" fill=none stroke=currentColor stroke-width=2.4 stroke-linecap=round stroke-linejoin=round><path d="m9 18 6-6-6-6"/></svg><span class=tname></span></summary><pre></pre>';
    d.querySelector('.tname').textContent=m.text;
    d.querySelector('pre').textContent=m.detail||'';
    d.addEventListener('toggle',()=>{d.open?openTools.add(gi):openTools.delete(gi);});
    return d;
  }
  const d=document.createElement('div');
  if(m.kind==='thinking'){d.className='msg think '+m.role;d.innerHTML='<span class=lbl>thinking</span><span class=md></span>';d.querySelector('.md').innerHTML=md(m.text);return d;}
  d.className='msg '+m.role;
  if(m.role==='user'){d.textContent=m.text;}
  else{d.classList.add('md');d.innerHTML=md(m.text);}
  return d;
}
// Server paginates: we fetch a small tail window (open/pull-up) or the last-known
// message onward (live). norm() adapts an old (pre-pagination) server that still
// returns a plain array, so a not-yet-restarted server keeps working.
function norm(resp,wantStart){
  if(Array.isArray(resp)){const t=resp.length;const s=wantStart!=null?Math.max(0,Math.min(wantStart,t)):Math.max(0,t-shown);return{total:t,start:s,messages:resp.slice(s)};}
  return resp;
}
function renderWindow(resp,bottom){
  const M=$('msgs');const prevH=M.scrollHeight,prevTop=M.scrollTop;
  M.innerHTML='';nodes=[];total=resp.total;curStart=resp.start;
  if(curStart>0){const more=document.createElement('div');more.className='more';more.textContent='pull up for earlier';M.appendChild(more);}
  const ms=resp.messages||[];
  for(let i=0;i<ms.length;i++){const gi=curStart+i;const n=nodeFor(ms[i],gi);nodes.push(n);M.appendChild(n);}
  lastSig=ms.length?sig(ms[ms.length-1]):null;
  if(loadingMore){M.scrollTop=M.scrollHeight-prevH+prevTop;loadingMore=false;}
  else if(bottom)M.scrollTop=M.scrollHeight;
  if(cur)cacheMsgs(cur,resp);   // snapshot for instant load next time / while server boots
  typingEl=null;if(typingOn)showTyping();   // rebuild wiped it; re-pin the thinking dots last
}
async function loadWindow(bottom){
  if(!cur||$('conv').hidden)return;
  const qs=loadingMore?('start='+curStart):('tail='+shown);
  let resp;try{resp=norm(await(await fetch('/api/messages?id='+cur+'&'+qs)).json(),loadingMore?curStart:null);}catch(e){return;}
  renderWindow(resp,bottom);
}
async function loadLive(){
  if(!cur||$('conv').hidden||isSending(cur)||loadingMore)return;
  if(!nodes.length){return loadWindow(false);}
  const from=Math.max(curStart,total-1);
  let resp;try{resp=norm(await(await fetch('/api/messages?id='+cur+'&start='+from)).json(),from);}catch(e){return;}
  const ms=resp.messages||[];if(!ms.length){total=resp.total;return;}
  const M=$('msgs');const atBottom=M.scrollHeight-M.scrollTop-M.clientHeight<100;
  let changed=false;const k=from-curStart;
  // ms[0] is the last message we already had -> replace only if it changed (streaming)
  if(k>=0&&k<nodes.length&&sig(ms[0])!==lastSig){const nn=nodeFor(ms[0],from);M.replaceChild(nn,nodes[k]);nodes[k]=nn;changed=true;}
  if(ms.length>1)hideTyping();   // keep the thinking dots below any newly-streamed bubbles
  for(let i=1;i<ms.length;i++){const gi=from+i;const n=nodeFor(ms[i],gi);nodes.push(n);M.appendChild(n);changed=true;}
  total=resp.total;lastSig=sig(ms[ms.length-1]);
  if(typingOn)showTyping();
  if(changed&&atBottom)M.scrollTop=M.scrollHeight;
}
let typingOn=false, typingEl=null;
function showLoading(){$('msgs').innerHTML='<div class=loading><div class=spin></div></div>';}
function showTyping(){if(typingEl||$('conv').hidden||$('msgs').querySelector('.loading'))return;
  typingEl=document.createElement('div');typingEl.className='typing';typingEl.innerHTML='<span></span><span></span><span></span>';
  $('msgs').appendChild(typingEl);$('msgs').scrollTop=$('msgs').scrollHeight;}
function hideTyping(){if(typingEl){typingEl.remove();typingEl=null;}}
function setStatus(on){const s=$('cstatus');s.textContent=on?'working…':'idle';s.classList.toggle('on',!!on);$('stop').hidden=!on;typingOn=!!on;on?showTyping():hideTyping();
  if(!on&&wasWorking)markDone(curTitle);wasWorking=!!on;}   // working -> idle = AI done thinking
function setRing(pct){const w=$('ctxwrap');if(!w)return;
  if(pct==null||isNaN(pct)){w.innerHTML='';w.title='';return;}
  pct=Math.max(0,Math.min(100,Math.round(pct)));const r=11,c=2*Math.PI*r,off=c*(1-pct/100);
  const col=pct>=90?'#e5484d':pct>=70?'#ffcf6b':'#37d67a';
  w.innerHTML='<svg width=28 height=28 viewBox="0 0 28 28"><circle cx=14 cy=14 r='+r+' fill=none stroke=var(--line) stroke-width=3/><circle cx=14 cy=14 r='+r+' fill=none stroke="'+col+'" stroke-width=3 stroke-linecap=round stroke-dasharray="'+c.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'" transform="rotate(-90 14 14)"/></svg><span class=pct>'+pct+'%</span>';
  w.title='Context: '+pct+'% used';}
let es=null;
function startStream(){
  if(es){es.close();es=null;}
  if(!cur)return;
  try{es=new EventSource('/api/stream?id='+cur);
    es.onmessage=()=>{if(!isSending(cur))loadLive();};  // file changed -> fetch only new/changed
    es.onerror=()=>{};                                 // browser auto-reconnects
  }catch(e){}
}
function openChat(s){
  cur=s.id;curTitle=s.title;$('ctitle').textContent=s.title;avatar($('cmono'),s);
  shown=WIN;total=0;curStart=0;nodes=[];lastSig=null;openTools.clear();typingEl=null;typingOn=false;wasWorking=false;$('msgs').innerHTML='';
  $('chats').hidden=true;$('conv').hidden=false;$('convempty').hidden=true;
  document.querySelectorAll('#list .row').forEach(r=>r.classList.toggle('on',r.dataset.id===s.id));
  const t=$('in');t.value=loadDraft(s.id);t.style.height='auto';t.style.height=Math.min(140,t.scrollHeight)+'px';
  const c=cachedMsgs(s.id);if(c)renderWindow(c,true);else showLoading();   // instant paint from snapshot, else a spinner
  $('send').disabled=isSending(s.id);setStatus(s.running||isSending(s.id));setRing(s.ctxpct);$('arm').classList.toggle('on',!!s.armed);
  if(location.hash!=='#'+s.id)history.replaceState(null,'','#'+s.id);
  loadWindow(true);startStream();
}
function back(){if(es){es.close();es=null;}$('conv').hidden=true;$('chats').hidden=false;$('convempty').hidden=false;cur=null;
  setRing(null);history.replaceState(null,'',location.pathname+location.search);renderList();}
// restore the selected chat on refresh from the URL hash
function applyHash(){
  const id=location.hash.replace(/^#/,'');
  if(id&&id!==cur){const s=sessions.find(x=>x.id===id)||{id,title:'chat',running:false};openChat(s);}
  else if(!id&&cur)back();
}
window.addEventListener('hashchange',applyHash);

/* ---------- actions ---------- */
async function send(){
  const sid=cur,t=$('in'),v=t.value.trim();if(!v||!sid||isSending(sid))return;
  sendingSet.add(sid);saveDraft(sid,'');t.value='';t.style.height='auto';
  // optimistic echo (only if we're still viewing this chat); loadWindow reconciles on finish
  if(sid===cur){$('send').disabled=true;
    const M=$('msgs');const echo=document.createElement('div');echo.className='msg user';echo.textContent=v;M.appendChild(echo);
    setStatus(true);M.scrollTop=M.scrollHeight;}   // echo first, THEN the thinking dots go below it
  try{const r=await(await fetch('/api/send',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({id:sid,text:v})})).json();
    if(!r.ok)alert('send failed: '+r.error);}catch(e){alert(e);}
  sendingSet.delete(sid);
  if(sid===cur){$('send').disabled=false;setStatus(false);loadWindow(true);}
}
async function stop(){if(!cur)return;try{await fetch('/api/stop',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({id:cur})});}catch(e){}}
async function toggleArm(){
  if(!cur)return;const on=$('arm').classList.contains('on');
  try{
    if(on){await fetch('/api/disarm',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({id:cur})});$('arm').classList.remove('on');}
    else{const t=$('in').value.trim();await fetch('/api/arm',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({id:cur,text:t})});$('arm').classList.add('on');}
  }catch(e){}
}

/* ---------- wiring ---------- */
$('back').onclick=back;$('send').onclick=send;$('stop').onclick=stop;$('refresh').onclick=loadList;
$('bell').onclick=enableNotif;if(notifPerm==='granted')$('bell').classList.add('on');
$('arm').onclick=toggleArm;
$('q').addEventListener('input',renderList);
$('msgs').addEventListener('scroll',()=>{if($('msgs').scrollTop<40&&!loadingMore&&curStart>0){loadingMore=true;curStart=Math.max(0,curStart-WIN);loadWindow(false);}});
$('in').addEventListener('input',e=>{e.target.style.height='auto';e.target.style.height=Math.min(140,e.target.scrollHeight)+'px';if(cur)saveDraft(cur,e.target.value);});
$('in').addEventListener('keydown',e=>{
  if(e.key!=='Enter'||e.shiftKey)return;              // Shift+Enter -> newline (default)
  if(e.ctrlKey||e.metaKey){                            // Ctrl/Cmd+Enter -> newline
    e.preventDefault();const t=e.target;t.setRangeText('\n',t.selectionStart,t.selectionEnd,'end');t.dispatchEvent(new Event('input'));return;
  }
  e.preventDefault();send();                           // Enter -> send
});
try{const cs=JSON.parse(localStorage.getItem('ccb.sessions')||'null');if(cs){sessions=cs;renderList();}}catch(e){}  // instant list from cache
(async()=>{await loadList();applyHash();})();
setInterval(loadList,5000);setInterval(()=>{if(cur&&!isSending(cur))loadLive();},6000);/* SSE is primary; this is a safety-net fallback */
</script>
</body>
